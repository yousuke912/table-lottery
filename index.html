<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席替えくじ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden}
input,button,textarea{font-family:inherit}

.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:28px 16px;position:relative;z-index:1}
h1{font-size:clamp(24px,5vw,40px);font-weight:900;background:linear-gradient(120deg,#FECA57,#FF6B6B,#45aaf2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.06em}
.eyebrow{font-size:10px;letter-spacing:.3em;color:rgba(255,255,255,.3);margin-bottom:6px;text-transform:uppercase}
.header{text-align:center;margin-bottom:28px}

/* Step indicator */
.steps{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:28px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.step-dot.done{background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a}
.step-dot.active{background:rgba(254,202,87,.2);border-color:#FECA57;color:#FECA57}
.step-dot.pending{background:rgba(255,255,255,.07);color:rgba(255,255,255,.3)}
.step-label{font-size:10px;margin:0 4px;white-space:nowrap}
.step-label.active{color:rgba(255,255,255,.7)}
.step-label.done,.step-label.pending{color:rgba(255,255,255,.25)}
.step-line{width:16px;height:1px;background:rgba(255,255,255,.1);margin:0 2px}

/* Panel */
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px 20px}
.step-header{margin-bottom:20px}
.step-num{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:4px}
.step-title{font-size:20px;font-weight:800;margin-bottom:4px}
.step-desc{font-size:13px;color:rgba(255,255,255,.4)}

/* Inputs */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
label{font-size:12px;color:rgba(255,255,255,.4);display:block;margin-bottom:6px}
.inp{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;padding:9px 12px;outline:none}
.inp:focus{border-color:rgba(254,202,87,.4)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.add-btn{padding:9px 22px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;transition:.2s}
.add-btn:hover{background:rgba(255,255,255,.14)}

/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-bottom:16px}
.img-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px;text-align:center;position:relative}
.img-card img{width:56px;height:56px;border-radius:6px;object-fit:cover;margin-bottom:4px;background:rgba(255,255,255,.1)}
.img-name{font-size:10px;color:rgba(255,255,255,.6);word-break:break-all}
.del-btn{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(255,107,107,.8);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.empty-hint{text-align:center;padding:24px 0;color:rgba(255,255,255,.2);font-size:13px}

/* Next btn */
.next-btn{padding:15px 50px;font-size:16px;font-weight:800;border-radius:50px;border:none;background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a;cursor:pointer;box-shadow:0 8px 32px rgba(254,202,87,.35);transition:.25s;letter-spacing:.06em}
.next-btn:hover{transform:scale(1.04);box-shadow:0 12px 40px rgba(254,202,87,.5)}
.center{text-align:center}
.back-link{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;text-decoration:underline;margin-top:14px;display:block;text-align:center}

/* URL box */
.url-box{background:rgba(0,0,0,.4);border-radius:8px;padding:10px 12px;font-size:11px;color:rgba(255,255,255,.5);word-break:break-all;border:1px solid rgba(255,255,255,.06);margin-bottom:12px;line-height:1.7}
.copy-btn{padding:9px 22px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;transition:.2s}
.copy-btn.copied{background:rgba(38,222,129,.2);border-color:#26de81;color:#26de81}
.hint-text{font-size:11px;color:rgba(255,255,255,.2);margin-top:10px}

/* Slider */
.slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.slider-val{font-size:30px;font-weight:900;background:linear-gradient(135deg,#FECA57,#FF9F43);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.slider-sub{font-size:12px;font-weight:400;-webkit-text-fill-color:rgba(255,255,255,.4);margin-left:6px}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#FECA57,#FF6B6B);cursor:pointer;box-shadow:0 0 12px rgba(254,202,87,.6)}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2);margin-top:6px}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px;text-align:center}
.stat-label{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:800}

/* Result */
.result-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 16px;margin-bottom:16px;text-align:center}
.result-box.shaking{animation:shake .4s infinite}
.result-cards{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;align-items:center}
.r-card-table,.r-card-seat{border-radius:14px;padding:18px 32px;min-width:120px;text-align:center}
.r-card-label{font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.4);margin-bottom:4px}
.r-card-num{font-size:52px;font-weight:900;line-height:1}
.r-img{text-align:center}
.r-img img{width:72px;height:72px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,.3);margin-bottom:4px;display:block;margin:0 auto 4px}
.r-img-name{font-size:11px;color:rgba(255,255,255,.7)}
.no-result{color:rgba(255,255,255,.2);font-size:13px;padding:16px 0}

/* Draw buttons */
.draw-area{display:flex;gap:10px;margin-bottom:24px;justify-content:center}
.draw-btn{padding:14px 44px;font-size:16px;font-weight:800;border-radius:50px;border:none;cursor:pointer;transition:.25s;letter-spacing:.06em;animation:pulse-glow 2.5s ease-in-out infinite}
.draw-btn:disabled{background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.25)!important;box-shadow:none!important;animation:none!important;cursor:not-allowed}
.draw-btn:not(:disabled):hover{transform:scale(1.04)}
.reset-btn{padding:14px 22px;font-size:13px;font-weight:600;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);cursor:pointer;transition:.2s}
.reset-btn:hover{background:rgba(255,255,255,.12)}

/* Seat map */
.map-title{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.12em;margin-bottom:10px;text-align:center}
.table-grid{display:grid;gap:7px}
.t-card{border-radius:9px;padding:7px 5px}
.t-label{font-size:9px;font-weight:700;text-align:center;margin-bottom:4px}
.seat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.seat{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .3s;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.seat img{width:100%;height:100%;object-fit:cover;opacity:.85}

/* Drawn list */
.drawn-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.drawn-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* Particle */
.particle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:pop .8s ease-out forwards;z-index:9999}

@keyframes pop{0%{transform:scale(0) translateY(0);opacity:1}100%{transform:scale(1.5) translateY(-120px);opacity:0}}
@keyframes reveal{0%{transform:scale(.5) rotateY(90deg);opacity:0}60%{transform:scale(1.1) rotateY(-8deg)}100%{transform:scale(1) rotateY(0);opacity:1}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(254,202,87,.4)}50%{box-shadow:0 0 50px rgba(254,202,87,.9),0 0 80px rgba(255,107,107,.4)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-1deg)}40%{transform:translateX(6px) rotate(1deg)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">Table &amp; Seat</div>
    <h1>席替えくじ</h1>
  </div>
  <div class="steps" id="steps"></div>
  <div class="panel" id="panel"></div>
  <button class="back-link" id="back-btn" style="display:none" onclick="goBack()">← 前のステップに戻る</button>
</div>

<script>
const SEATS = 6;
const COLORS = ["#FF6B6B","#FF9F43","#FECA57","#26de81","#45aaf2","#a55eea","#fd9644","#2bcbba","#eb3b5a","#4b7bec","#f7b731","#20bf6b","#0fb9b1","#8854d0","#3867d6"];
function gc(i){return COLORS[i%COLORS.length]}

// State
let step=0, images=[], tableCount=5;
let drawn=new Set(), assignments={}, result=null, animating=false, lotTimer=null;

function enc(arr){try{return btoa(unescape(encodeURIComponent(JSON.stringify(arr))))}catch{return""}}
function dec(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))))}catch{return null}}

// Init from URL
window.addEventListener('DOMContentLoaded',()=>{
  try{
    const p=new URLSearchParams(location.search);
    const d=p.get('data');
    if(d){const arr=dec(d);if(arr&&Array.isArray(arr)){images=arr;step=2;}}
  }catch(e){}
  render();
});

function render(){
  renderSteps();
  renderPanel();
  document.getElementById('back-btn').style.display=(step>0&&step<3)?'block':'none';
}

function renderSteps(){
  const labels=['画像設定','リンク固定','テーブル設定','抽選'];
  const el=document.getElementById('steps');
  el.innerHTML='';
  labels.forEach((l,i)=>{
    const dot=document.createElement('div');
    dot.className='step-dot '+(i<step?'done':i===step?'active':'pending');
    dot.textContent=i<step?'✓':i+1;
    el.appendChild(dot);
    const lbl=document.createElement('div');
    lbl.className='step-label '+(i<step?'done':i===step?'active':'pending');
    lbl.textContent=l;
    el.appendChild(lbl);
    if(i<labels.length-1){const line=document.createElement('div');line.className='step-line';el.appendChild(line);}
  });
}

function stepHeader(n,title,desc){
  return `<div class="step-header"><div class="step-num">STEP ${n} / 4</div><div class="step-title">${title}</div><div class="step-desc">${desc}</div></div>`;
}

function renderPanel(){
  const p=document.getElementById('panel');
  if(step===0) p.innerHTML=renderImages();
  else if(step===1) p.innerHTML=renderLink();
  else if(step===2) p.innerHTML=renderTable();
  else if(step===3) p.innerHTML=renderLottery();
}

// STEP 1
function renderImages(){
  const imgs=images.map((img,i)=>`
    <div class="img-card">
      <button class="del-btn" onclick="delImage(${img.id})">×</button>
      <img src="${img.url}" onerror="this.style.display='none'" alt="">
      <div class="img-name">${img.name}</div>
    </div>`).join('');
  return `
    ${stepHeader(1,'画像を設定','参加者の顔写真URLと名前を登録してください')}
    <div class="card" style="margin-bottom:14px">
      <div class="grid2">
        <div><label>名前（任意）</label><input class="inp" id="iname" placeholder="例：田中 太郎" onkeydown="if(event.key==='Enter')addImage()"></div>
        <div><label>画像URL</label><input class="inp" id="iurl" placeholder="https://..." onkeydown="if(event.key==='Enter')addImage()"></div>
      </div>
      <button class="add-btn" onclick="addImage()">＋ 追加</button>
    </div>
    ${images.length>0?`<div class="img-grid">${imgs}</div>`:'<div class="empty-hint">画像を追加してください（スキップも可能）</div>'}
    <div class="center"><button class="next-btn" onclick="step=1;render()">次へ：リンクを固定する →</button></div>`;
}

function addImage(){
  const url=document.getElementById('iurl').value.trim();
  if(!url)return;
  const name=document.getElementById('iname').value.trim()||`画像${images.length+1}`;
  images.push({id:Date.now(),name,url});
  document.getElementById('iurl').value='';
  document.getElementById('iname').value='';
  renderPanel();
}
function delImage(id){images=images.filter(i=>i.id!==id);renderPanel();}

// STEP 2
function renderLink(){
  const encoded=enc(images);
  const shareUrl=`https://yousuke912.github.io/table-lottery/?data=${encoded}`;
  return `
    ${stepHeader(2,'リンクを固定','このURLを共有すると画像設定済みの状態で開けます')}
    <div class="card" style="margin-bottom:16px">
      <label>共有URL</label>
      <div class="url-box" id="share-url">${shareUrl}</div>
      <button class="copy-btn" id="copy-btn" onclick="copyUrl('${shareUrl}')">📋 URLをコピー</button>
      <div class="hint-text">※ このURLを開くとSTEP3（テーブル設定）から始まります</div>
    </div>
    <div class="center"><button class="next-btn" onclick="step=2;render()">次へ：テーブル数を設定する →</button></div>`;
}
function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✅ コピーしました！';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 URLをコピー';btn.classList.remove('copied')},2000);
  });
}

// STEP 3
function renderTable(){
  return `
    ${stepHeader(3,'テーブル数を設定','スライダーでテーブル数を調整してください（各テーブル最大6席）')}
    <div class="card" style="margin-bottom:20px">
      <div class="slider-row">
        <span style="font-size:13px;color:rgba(255,255,255,.5)">テーブル数</span>
        <span class="slider-val">${tableCount}<span class="slider-sub">テーブル / 最大${tableCount*SEATS}席</span></span>
      </div>
      <input type="range" min="1" max="100" value="${tableCount}" oninput="tableCount=+this.value;document.querySelector('.slider-val').innerHTML=tableCount+'<span class=slider-sub>テーブル / 最大'+(tableCount*${SEATS})+'席</span>'">
      <div class="slider-labels"><span>1</span><span>50</span><span>100</span></div>
    </div>
    <div class="center"><button class="next-btn" onclick="startLottery()">抽選スタート 🎲</button></div>`;
}
function startLottery(){drawn=new Set();assignments={};result=null;step=3;render();}

// STEP 4
function renderLottery(){
  const total=tableCount*SEATS;
  const remaining=total-drawn.size;

  let resultHtml='<div class="no-result">ボタンを押してくじを引いてください</div>';
  if(result||animating){
    const t=result?result.t:Math.floor(Math.random()*tableCount)+1;
    const s=result?result.s:Math.floor(Math.random()*SEATS)+1;
    const color=gc(t-1);
    const anim=!animating&&result?'animation:reveal .5s cubic-bezier(.34,1.56,.64,1) forwards':'';
    const animS=!animating&&result?'animation:reveal .5s .1s cubic-bezier(.34,1.56,.64,1) both':'';
    const assignedImg=result&&assignments[`${result.t}-${result.s}`];
    resultHtml=`<div class="result-cards">
      <div class="r-card-table" style="${anim};background:linear-gradient(135deg,${color}22,${color}44);border:2px solid ${color};${!animating&&result?'box-shadow:0 0 40px '+color+'55':''}">
        <div class="r-card-label">TABLE</div>
        <div class="r-card-num" style="color:${color}" id="disp-t">${t}</div>
      </div>
      <div class="r-card-seat" style="${animS};background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15)">
        <div class="r-card-label">SEAT</div>
        <div class="r-card-num" style="color:#fff" id="disp-s">${s}</div>
      </div>
      ${assignedImg?`<div class="r-img" style="animation:reveal .5s .2s cubic-bezier(.34,1.56,.64,1) both"><img src="${assignedImg.url}" onerror="this.style.display='none'" alt=""><div class="r-img-name">${assignedImg.name}</div></div>`:''}
    </div>`;
  }

  // Seat map
  let mapHtml='';
  if(tableCount<=30){
    const cols=tableCount<=10?130:95;
    let cards='';
    for(let t=1;t<=tableCount;t++){
      const color=gc(t-1);
      let seats='';
      for(let s=1;s<=SEATS;s++){
        const key=`${t}-${s}`;
        const isDrawn=drawn.has(key);
        const isLatest=result&&result.t===t&&result.s===s;
        const img=assignments[key];
        const bg=isLatest?color:isDrawn?color+'55':'rgba(255,255,255,.07)';
        const border=isLatest?`2px solid ${color}`:'1px solid rgba(255,255,255,.06)';
        const shadow=isLatest?`box-shadow:0 0 10px ${color}`:'';
        seats+=`<div class="seat" style="background:${bg};border:${border};${shadow};color:${isDrawn?'#fff':'rgba(255,255,255,.3)'}">
          ${img?`<img src="${img.url}" onerror="this.style.display='none'" alt="">`:(s)}
        </div>`;
      }
      cards+=`<div class="t-card" style="background:linear-gradient(135deg,${color}11,${color}22);border:1px solid ${color}44">
        <div class="t-label" style="color:${color}">T${t}</div>
        <div class="seat-grid">${seats}</div>
      </div>`;
    }
    mapHtml=`<div class="map-title">── 座席マップ ──</div>
      <div class="table-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cols}px,1fr))">${cards}</div>`;
  } else if(drawn.size>0){
    const tags=[...drawn].map(key=>{
      const [t,s]=key.split('-').map(Number);
      const isLatest=result&&result.t===t&&result.s===s;
      const color=gc(t-1);
      return `<div class="drawn-tag" style="background:${isLatest?color:color+'33'};color:${isLatest?'#1a1a1a':color};border:1px solid ${color}66">T${t}-${s}</div>`;
    }).join('');
    mapHtml=`<div class="map-title" style="margin-top:16px">── 抽選済みリスト ──</div><div class="drawn-list">${tags}</div>`;
  }

  const drawStyle=remaining===0?'background:rgba(255,255,255,.08);color:rgba(255,255,255,.25);box-shadow:none':'background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a;box-shadow:0 8px 32px rgba(254,202,87,.35)';
  const drawLabel=animating?'🎲 抽選中…':remaining===0?'✅ 全席抽選済み':'🎲 くじを引く';

  return `
    ${stepHeader(4,'抽選',`${tableCount}テーブル × 最大${SEATS}席`)}
    <div class="stats">
      <div class="stat-card"><div class="stat-label">総席数</div><div class="stat-val" style="color:#45aaf2">${total}</div></div>
      <div class="stat-card"><div class="stat-label">抽選済み</div><div class="stat-val" style="color:#26de81">${drawn.size}</div></div>
      <div class="stat-card"><div class="stat-label">残り</div><div class="stat-val" style="color:${remaining===0?'#555':'#FECA57'}">${remaining}</div></div>
    </div>
    <div class="result-box ${animating?'shaking':''}">${resultHtml}</div>
    <div class="draw-area">
      <button class="draw-btn" style="${drawStyle}" ${animating||remaining===0?'disabled':''} onclick="drawLot()">${drawLabel}</button>
      <button class="reset-btn" onclick="resetLottery()">リセット</button>
    </div>
    ${mapHtml}`;
}

function drawLot(){
  if(animating||drawn.size>=tableCount*SEATS)return;
  const pool=[];
  for(let t=1;t<=tableCount;t++)
    for(let s=1;s<=SEATS;s++)
      if(!drawn.has(`${t}-${s}`))pool.push({t,s});
  const picked=pool[Math.floor(Math.random()*pool.length)];
  const assignedImg=images.length>0?images[drawn.size%images.length]:null;
  animating=true;result=null;
  renderPanel();
  let count=0;
  lotTimer=setInterval(()=>{
    const rt=Math.floor(Math.random()*tableCount)+1;
    const rs=Math.floor(Math.random()*SEATS)+1;
    const dt=document.getElementById('disp-t');
    const ds=document.getElementById('disp-s');
    if(dt)dt.textContent=rt;
    if(ds)ds.textContent=rs;
    count++;
    if(count>=20){
      clearInterval(lotTimer);
      result=picked;
      const key=`${picked.t}-${picked.s}`;
      drawn.add(key);
      if(assignedImg)assignments[key]=assignedImg;
      animating=false;
      spawnParticles();
      renderPanel();
    }
  },60);
}

function resetLottery(){drawn=new Set();assignments={};result=null;animating=false;clearInterval(lotTimer);renderPanel();}

function goBack(){if(step>0&&step<3){step--;render();}}

function spawnParticles(){
  const colors=["#FECA57","#FF6B6B","#45aaf2","#26de81","#a55eea","#FF9F43"];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*innerWidth+'px';
    p.style.top=Math.random()*innerHeight*.5+'px';
    p.style.background=colors[i%colors.length];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}
</script>
</body>
</html><!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席替えくじ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden}
input,button,textarea{font-family:inherit}

.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:28px 16px;position:relative;z-index:1}
h1{font-size:clamp(24px,5vw,40px);font-weight:900;background:linear-gradient(120deg,#FECA57,#FF6B6B,#45aaf2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.06em}
.eyebrow{font-size:10px;letter-spacing:.3em;color:rgba(255,255,255,.3);margin-bottom:6px;text-transform:uppercase}
.header{text-align:center;margin-bottom:28px}

/* Step indicator */
.steps{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:28px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid transparent}
.step-dot.done{background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a}
.step-dot.active{background:rgba(254,202,87,.2);border-color:#FECA57;color:#FECA57}
.step-dot.pending{background:rgba(255,255,255,.07);color:rgba(255,255,255,.3)}
.step-label{font-size:10px;margin:0 4px;white-space:nowrap}
.step-label.active{color:rgba(255,255,255,.7)}
.step-label.done,.step-label.pending{color:rgba(255,255,255,.25)}
.step-line{width:16px;height:1px;background:rgba(255,255,255,.1);margin:0 2px}

/* Panel */
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:24px 20px}
.step-header{margin-bottom:20px}
.step-num{font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:4px}
.step-title{font-size:20px;font-weight:800;margin-bottom:4px}
.step-desc{font-size:13px;color:rgba(255,255,255,.4)}

/* Inputs */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
label{font-size:12px;color:rgba(255,255,255,.4);display:block;margin-bottom:6px}
.inp{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:13px;padding:9px 12px;outline:none}
.inp:focus{border-color:rgba(254,202,87,.4)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.add-btn{padding:9px 22px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;transition:.2s}
.add-btn:hover{background:rgba(255,255,255,.14)}

/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-bottom:16px}
.img-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px;text-align:center;position:relative}
.img-card img{width:56px;height:56px;border-radius:6px;object-fit:cover;margin-bottom:4px;background:rgba(255,255,255,.1)}
.img-name{font-size:10px;color:rgba(255,255,255,.6);word-break:break-all}
.del-btn{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(255,107,107,.8);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.empty-hint{text-align:center;padding:24px 0;color:rgba(255,255,255,.2);font-size:13px}

/* Next btn */
.next-btn{padding:15px 50px;font-size:16px;font-weight:800;border-radius:50px;border:none;background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a;cursor:pointer;box-shadow:0 8px 32px rgba(254,202,87,.35);transition:.25s;letter-spacing:.06em}
.next-btn:hover{transform:scale(1.04);box-shadow:0 12px 40px rgba(254,202,87,.5)}
.center{text-align:center}
.back-link{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;text-decoration:underline;margin-top:14px;display:block;text-align:center}

/* URL box */
.url-box{background:rgba(0,0,0,.4);border-radius:8px;padding:10px 12px;font-size:11px;color:rgba(255,255,255,.5);word-break:break-all;border:1px solid rgba(255,255,255,.06);margin-bottom:12px;line-height:1.7}
.copy-btn{padding:9px 22px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;transition:.2s}
.copy-btn.copied{background:rgba(38,222,129,.2);border-color:#26de81;color:#26de81}
.hint-text{font-size:11px;color:rgba(255,255,255,.2);margin-top:10px}

/* Slider */
.slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.slider-val{font-size:30px;font-weight:900;background:linear-gradient(135deg,#FECA57,#FF9F43);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.slider-sub{font-size:12px;font-weight:400;-webkit-text-fill-color:rgba(255,255,255,.4);margin-left:6px}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#FECA57,#FF6B6B);cursor:pointer;box-shadow:0 0 12px rgba(254,202,87,.6)}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2);margin-top:6px}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px;text-align:center}
.stat-label{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:800}

/* Result */
.result-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 16px;margin-bottom:16px;text-align:center}
.result-box.shaking{animation:shake .4s infinite}
.result-cards{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;align-items:center}
.r-card-table,.r-card-seat{border-radius:14px;padding:18px 32px;min-width:120px;text-align:center}
.r-card-label{font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.4);margin-bottom:4px}
.r-card-num{font-size:52px;font-weight:900;line-height:1}
.r-img{text-align:center}
.r-img img{width:72px;height:72px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,.3);margin-bottom:4px;display:block;margin:0 auto 4px}
.r-img-name{font-size:11px;color:rgba(255,255,255,.7)}
.no-result{color:rgba(255,255,255,.2);font-size:13px;padding:16px 0}

/* Draw buttons */
.draw-area{display:flex;gap:10px;margin-bottom:24px;justify-content:center}
.draw-btn{padding:14px 44px;font-size:16px;font-weight:800;border-radius:50px;border:none;cursor:pointer;transition:.25s;letter-spacing:.06em;animation:pulse-glow 2.5s ease-in-out infinite}
.draw-btn:disabled{background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.25)!important;box-shadow:none!important;animation:none!important;cursor:not-allowed}
.draw-btn:not(:disabled):hover{transform:scale(1.04)}
.reset-btn{padding:14px 22px;font-size:13px;font-weight:600;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);cursor:pointer;transition:.2s}
.reset-btn:hover{background:rgba(255,255,255,.12)}

/* Seat map */
.map-title{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.12em;margin-bottom:10px;text-align:center}
.table-grid{display:grid;gap:7px}
.t-card{border-radius:9px;padding:7px 5px}
.t-label{font-size:9px;font-weight:700;text-align:center;margin-bottom:4px}
.seat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.seat{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .3s;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.seat img{width:100%;height:100%;object-fit:cover;opacity:.85}

/* Drawn list */
.drawn-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.drawn-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* Particle */
.particle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:pop .8s ease-out forwards;z-index:9999}

@keyframes pop{0%{transform:scale(0) translateY(0);opacity:1}100%{transform:scale(1.5) translateY(-120px);opacity:0}}
@keyframes reveal{0%{transform:scale(.5) rotateY(90deg);opacity:0}60%{transform:scale(1.1) rotateY(-8deg)}100%{transform:scale(1) rotateY(0);opacity:1}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(254,202,87,.4)}50%{box-shadow:0 0 50px rgba(254,202,87,.9),0 0 80px rgba(255,107,107,.4)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px) rotate(-1deg)}40%{transform:translateX(6px) rotate(1deg)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">Table &amp; Seat</div>
    <h1>席替えくじ</h1>
  </div>
  <div class="steps" id="steps"></div>
  <div class="panel" id="panel"></div>
  <button class="back-link" id="back-btn" style="display:none" onclick="goBack()">← 前のステップに戻る</button>
</div>

<script>
const SEATS = 6;
const COLORS = ["#FF6B6B","#FF9F43","#FECA57","#26de81","#45aaf2","#a55eea","#fd9644","#2bcbba","#eb3b5a","#4b7bec","#f7b731","#20bf6b","#0fb9b1","#8854d0","#3867d6"];
function gc(i){return COLORS[i%COLORS.length]}

// State
let step=0, images=[], tableCount=5;
let drawn=new Set(), assignments={}, result=null, animating=false, lotTimer=null;

function enc(arr){try{return btoa(unescape(encodeURIComponent(JSON.stringify(arr))))}catch{return""}}
function dec(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))))}catch{return null}}

// Init from URL
window.addEventListener('DOMContentLoaded',()=>{
  try{
    const p=new URLSearchParams(location.search);
    const d=p.get('data');
    if(d){const arr=dec(d);if(arr&&Array.isArray(arr)){images=arr;step=2;}}
  }catch(e){}
  render();
});

function render(){
  renderSteps();
  renderPanel();
  document.getElementById('back-btn').style.display=(step>0&&step<3)?'block':'none';
}

function renderSteps(){
  const labels=['画像設定','リンク固定','テーブル設定','抽選'];
  const el=document.getElementById('steps');
  el.innerHTML='';
  labels.forEach((l,i)=>{
    const dot=document.createElement('div');
    dot.className='step-dot '+(i<step?'done':i===step?'active':'pending');
    dot.textContent=i<step?'✓':i+1;
    el.appendChild(dot);
    const lbl=document.createElement('div');
    lbl.className='step-label '+(i<step?'done':i===step?'active':'pending');
    lbl.textContent=l;
    el.appendChild(lbl);
    if(i<labels.length-1){const line=document.createElement('div');line.className='step-line';el.appendChild(line);}
  });
}

function stepHeader(n,title,desc){
  return `<div class="step-header"><div class="step-num">STEP ${n} / 4</div><div class="step-title">${title}</div><div class="step-desc">${desc}</div></div>`;
}

function renderPanel(){
  const p=document.getElementById('panel');
  if(step===0) p.innerHTML=renderImages();
  else if(step===1) p.innerHTML=renderLink();
  else if(step===2) p.innerHTML=renderTable();
  else if(step===3) p.innerHTML=renderLottery();
}

// STEP 1
function renderImages(){
  const imgs=images.map((img,i)=>`
    <div class="img-card">
      <button class="del-btn" onclick="delImage(${img.id})">×</button>
      <img src="${img.url}" onerror="this.style.display='none'" alt="">
      <div class="img-name">${img.name}</div>
    </div>`).join('');
  return `
    ${stepHeader(1,'画像を設定','参加者の顔写真URLと名前を登録してください')}
    <div class="card" style="margin-bottom:14px">
      <div class="grid2">
        <div><label>名前（任意）</label><input class="inp" id="iname" placeholder="例：田中 太郎" onkeydown="if(event.key==='Enter')addImage()"></div>
        <div><label>画像URL</label><input class="inp" id="iurl" placeholder="https://..." onkeydown="if(event.key==='Enter')addImage()"></div>
      </div>
      <button class="add-btn" onclick="addImage()">＋ 追加</button>
    </div>
    ${images.length>0?`<div class="img-grid">${imgs}</div>`:'<div class="empty-hint">画像を追加してください（スキップも可能）</div>'}
    <div class="center"><button class="next-btn" onclick="step=1;render()">次へ：リンクを固定する →</button></div>`;
}

function addImage(){
  const url=document.getElementById('iurl').value.trim();
  if(!url)return;
  const name=document.getElementById('iname').value.trim()||`画像${images.length+1}`;
  images.push({id:Date.now(),name,url});
  document.getElementById('iurl').value='';
  document.getElementById('iname').value='';
  renderPanel();
}
function delImage(id){images=images.filter(i=>i.id!==id);renderPanel();}

// STEP 2
function renderLink(){
  const encoded=enc(images);
  const shareUrl=`https://yousuke912.github.io/table-lottery/?data=${encoded}`;
  return `
    ${stepHeader(2,'リンクを固定','このURLを共有すると画像設定済みの状態で開けます')}
    <div class="card" style="margin-bottom:16px">
      <label>共有URL</label>
      <div class="url-box" id="share-url">${shareUrl}</div>
      <button class="copy-btn" id="copy-btn" onclick="copyUrl('${shareUrl}')">📋 URLをコピー</button>
      <div class="hint-text">※ このURLを開くとSTEP3（テーブル設定）から始まります</div>
    </div>
    <div class="center"><button class="next-btn" onclick="step=2;render()">次へ：テーブル数を設定する →</button></div>`;
}
function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✅ コピーしました！';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 URLをコピー';btn.classList.remove('copied')},2000);
  });
}

// STEP 3
function renderTable(){
  return `
    ${stepHeader(3,'テーブル数を設定','スライダーでテーブル数を調整してください（各テーブル最大6席）')}
    <div class="card" style="margin-bottom:20px">
      <div class="slider-row">
        <span style="font-size:13px;color:rgba(255,255,255,.5)">テーブル数</span>
        <span class="slider-val">${tableCount}<span class="slider-sub">テーブル / 最大${tableCount*SEATS}席</span></span>
      </div>
      <input type="range" min="1" max="100" value="${tableCount}" oninput="tableCount=+this.value;document.querySelector('.slider-val').innerHTML=tableCount+'<span class=slider-sub>テーブル / 最大'+(tableCount*${SEATS})+'席</span>'">
      <div class="slider-labels"><span>1</span><span>50</span><span>100</span></div>
    </div>
    <div class="center"><button class="next-btn" onclick="startLottery()">抽選スタート 🎲</button></div>`;
}
function startLottery(){drawn=new Set();assignments={};result=null;step=3;render();}

// STEP 4
function renderLottery(){
  const total=tableCount*SEATS;
  const remaining=total-drawn.size;

  let resultHtml='<div class="no-result">ボタンを押してくじを引いてください</div>';
  if(result||animating){
    const t=result?result.t:Math.floor(Math.random()*tableCount)+1;
    const s=result?result.s:Math.floor(Math.random()*SEATS)+1;
    const color=gc(t-1);
    const anim=!animating&&result?'animation:reveal .5s cubic-bezier(.34,1.56,.64,1) forwards':'';
    const animS=!animating&&result?'animation:reveal .5s .1s cubic-bezier(.34,1.56,.64,1) both':'';
    const assignedImg=result&&assignments[`${result.t}-${result.s}`];
    resultHtml=`<div class="result-cards">
      <div class="r-card-table" style="${anim};background:linear-gradient(135deg,${color}22,${color}44);border:2px solid ${color};${!animating&&result?'box-shadow:0 0 40px '+color+'55':''}">
        <div class="r-card-label">TABLE</div>
        <div class="r-card-num" style="color:${color}" id="disp-t">${t}</div>
      </div>
      <div class="r-card-seat" style="${animS};background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15)">
        <div class="r-card-label">SEAT</div>
        <div class="r-card-num" style="color:#fff" id="disp-s">${s}</div>
      </div>
      ${assignedImg?`<div class="r-img" style="animation:reveal .5s .2s cubic-bezier(.34,1.56,.64,1) both"><img src="${assignedImg.url}" onerror="this.style.display='none'" alt=""><div class="r-img-name">${assignedImg.name}</div></div>`:''}
    </div>`;
  }

  // Seat map
  let mapHtml='';
  if(tableCount<=30){
    const cols=tableCount<=10?130:95;
    let cards='';
    for(let t=1;t<=tableCount;t++){
      const color=gc(t-1);
      let seats='';
      for(let s=1;s<=SEATS;s++){
        const key=`${t}-${s}`;
        const isDrawn=drawn.has(key);
        const isLatest=result&&result.t===t&&result.s===s;
        const img=assignments[key];
        const bg=isLatest?color:isDrawn?color+'55':'rgba(255,255,255,.07)';
        const border=isLatest?`2px solid ${color}`:'1px solid rgba(255,255,255,.06)';
        const shadow=isLatest?`box-shadow:0 0 10px ${color}`:'';
        seats+=`<div class="seat" style="background:${bg};border:${border};${shadow};color:${isDrawn?'#fff':'rgba(255,255,255,.3)'}">
          ${img?`<img src="${img.url}" onerror="this.style.display='none'" alt="">`:(s)}
        </div>`;
      }
      cards+=`<div class="t-card" style="background:linear-gradient(135deg,${color}11,${color}22);border:1px solid ${color}44">
        <div class="t-label" style="color:${color}">T${t}</div>
        <div class="seat-grid">${seats}</div>
      </div>`;
    }
    mapHtml=`<div class="map-title">── 座席マップ ──</div>
      <div class="table-grid" style="grid-template-columns:repeat(auto-fill,minmax(${cols}px,1fr))">${cards}</div>`;
  } else if(drawn.size>0){
    const tags=[...drawn].map(key=>{
      const [t,s]=key.split('-').map(Number);
      const isLatest=result&&result.t===t&&result.s===s;
      const color=gc(t-1);
      return `<div class="drawn-tag" style="background:${isLatest?color:color+'33'};color:${isLatest?'#1a1a1a':color};border:1px solid ${color}66">T${t}-${s}</div>`;
    }).join('');
    mapHtml=`<div class="map-title" style="margin-top:16px">── 抽選済みリスト ──</div><div class="drawn-list">${tags}</div>`;
  }

  const drawStyle=remaining===0?'background:rgba(255,255,255,.08);color:rgba(255,255,255,.25);box-shadow:none':'background:linear-gradient(135deg,#FECA57,#FF6B6B);color:#1a1a1a;box-shadow:0 8px 32px rgba(254,202,87,.35)';
  const drawLabel=animating?'🎲 抽選中…':remaining===0?'✅ 全席抽選済み':'🎲 くじを引く';

  return `
    ${stepHeader(4,'抽選',`${tableCount}テーブル × 最大${SEATS}席`)}
    <div class="stats">
      <div class="stat-card"><div class="stat-label">総席数</div><div class="stat-val" style="color:#45aaf2">${total}</div></div>
      <div class="stat-card"><div class="stat-label">抽選済み</div><div class="stat-val" style="color:#26de81">${drawn.size}</div></div>
      <div class="stat-card"><div class="stat-label">残り</div><div class="stat-val" style="color:${remaining===0?'#555':'#FECA57'}">${remaining}</div></div>
    </div>
    <div class="result-box ${animating?'shaking':''}">${resultHtml}</div>
    <div class="draw-area">
      <button class="draw-btn" style="${drawStyle}" ${animating||remaining===0?'disabled':''} onclick="drawLot()">${drawLabel}</button>
      <button class="reset-btn" onclick="resetLottery()">リセット</button>
    </div>
    ${mapHtml}`;
}

function drawLot(){
  if(animating||drawn.size>=tableCount*SEATS)return;
  const pool=[];
  for(let t=1;t<=tableCount;t++)
    for(let s=1;s<=SEATS;s++)
      if(!drawn.has(`${t}-${s}`))pool.push({t,s});
  const picked=pool[Math.floor(Math.random()*pool.length)];
  const assignedImg=images.length>0?images[drawn.size%images.length]:null;
  animating=true;result=null;
  renderPanel();
  let count=0;
  lotTimer=setInterval(()=>{
    const rt=Math.floor(Math.random()*tableCount)+1;
    const rs=Math.floor(Math.random()*SEATS)+1;
    const dt=document.getElementById('disp-t');
    const ds=document.getElementById('disp-s');
    if(dt)dt.textContent=rt;
    if(ds)ds.textContent=rs;
    count++;
    if(count>=20){
      clearInterval(lotTimer);
      result=picked;
      const key=`${picked.t}-${picked.s}`;
      drawn.add(key);
      if(assignedImg)assignments[key]=assignedImg;
      animating=false;
      spawnParticles();
      renderPanel();
    }
  },60);
}

function resetLottery(){drawn=new Set();assignments={};result=null;animating=false;clearInterval(lotTimer);renderPanel();}

function goBack(){if(step>0&&step<3){step--;render();}}

function spawnParticles(){
  const colors=["#FECA57","#FF6B6B","#45aaf2","#26de81","#a55eea","#FF9F43"];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*innerWidth+'px';
    p.style.top=Math.random()*innerHeight*.5+'px';
    p.style.background=colors[i%colors.length];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}
</script>
