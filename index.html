<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テーブル抽選システム</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}

#settings-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center}
#settings-overlay.hidden{display:none}
.s-modal{background:#fff;border-radius:20px;padding:1.8rem;width:min(460px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.s-modal h2{font-size:1.2rem;font-weight:700;margin-bottom:1.2rem;color:#333}
.field{margin-bottom:1rem}
.field label{display:block;font-size:0.82rem;color:#666;margin-bottom:4px}
.ri{display:flex;align-items:center;gap:8px}
.field input[type=number]{width:76px;height:40px;border:1.5px solid #ddd;border-radius:8px;font-size:1rem;text-align:center;padding:0 6px;outline:none;transition:border-color .2s}
.field input[type=number]:focus{border-color:#667eea}
.field input[type=text]{width:100%;height:40px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;padding:0 12px;outline:none;transition:border-color .2s}
.field input[type=text]:focus{border-color:#667eea}
.hint{font-size:0.76rem;color:#bbb;margin-top:4px}
.exc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.exc-tag{font-size:0.74rem;padding:2px 10px;border-radius:999px;background:#ffe0e0;color:#c0392b;font-weight:600}
.btn-apply{width:100%;height:48px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:1.2rem;transition:opacity .2s}
.btn-apply:hover{opacity:.88}

#main{height:100vh;display:grid;grid-template-rows:auto 1fr;gap:10px;padding:10px;position:relative}

#gear-btn{position:fixed;top:10px;right:10px;z-index:50;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#gear-btn:hover{background:rgba(255,255,255,0.35)}

#img-area{width:100%;aspect-ratio:16/9;max-height:38vh;background:rgba(255,255,255,0.12);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed rgba(255,255,255,0.3);transition:border-color .2s}
#img-area:hover{border-color:rgba(255,255,255,0.6)}
#img-area img{width:100%;height:100%;object-fit:cover;display:none}
#img-ph{text-align:center;color:rgba(255,255,255,0.55);pointer-events:none}
#img-ph .ico{font-size:1.8rem;margin-bottom:6px}
#img-ph p{font-size:0.82rem}
#file-in{display:none}

#lottery{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:4px 0}

.phase-hint{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.18);border-radius:999px;padding:3px 14px}

.cards{display:flex;gap:12px;width:100%;max-width:520px}
.card{flex:1;background:rgba(255,255,255,0.15);border-radius:14px;padding:10px 8px 12px;text-align:center;border:1.5px solid rgba(255,255,255,0.2);transition:border-color .3s,background .3s}
.card.spinning{border-color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.25)}
.card.fixed{border-color:rgba(255,220,80,0.9);background:rgba(255,220,80,0.15)}
.card-lbl{font-size:0.7rem;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:.06em;margin-bottom:4px}
.card-val{font-size:clamp(2.2rem,8vw,4rem);font-weight:800;color:#fff;line-height:1;min-height:1.1em;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.card-val.spin{animation:shk .08s steps(1) infinite}
@keyframes shk{0%{transform:translateY(-3px)}50%{transform:translateY(3px)}100%{transform:translateY(0)}}

.btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:520px}
.btn{height:44px;padding:0 20px;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:5px}
.btn:disabled{opacity:.35;cursor:default}
.btn-start{background:#4caf7d;color:#fff}
.btn-stop{background:#f06292;color:#fff}
.btn-reset{background:#ffa726;color:#fff}

.remain{font-size:0.76rem;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.15);border-radius:999px;padding:3px 12px}
.hist{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;width:100%;max-width:520px;max-height:8vh;overflow-y:auto}
.h-tag{font-size:0.72rem;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.h-tag.latest{background:rgba(255,255,255,0.5);color:#333}

#jaan-wrap{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none}
#jaan-txt{font-size:clamp(3rem,12vw,8rem);font-weight:900;color:#fff;text-shadow:0 4px 32px rgba(0,0,0,0.4);opacity:0;transform:scale(0.4)}
#jaan-txt.pop{animation:jpop .6s cubic-bezier(.34,1.7,.64,1) forwards}
#jaan-txt.fade{animation:jfade .5s ease-out forwards}
@keyframes jpop{0%{opacity:0;transform:scale(.4)}60%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
@keyframes jfade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.4)}}
</style>
</head>
<body>

<div id="settings-overlay">
  <div class="s-modal">
    <h2>⚙️ テーブル設定</h2>
    <div class="field">
      <label>テーブル番号の範囲</label>
      <div class="ri">
        <input type="number" id="from" value="1" min="1" max="999">
        <span style="color:#888">〜</span>
        <input type="number" id="to" value="60" min="1" max="999">
        <span style="color:#888;font-size:.9rem">番</span>
      </div>
    </div>
    <div class="field">
      <label>除外する番号（カンマ区切り）</label>
      <input type="text" id="exc" placeholder="例：55, 56, 30">
      <div class="hint">入力した番号は抽選から除外されます</div>
      <div class="exc-tags" id="excTags"></div>
    </div>
    <button class="btn-apply" onclick="applySettings()">設定を適用して抽選開始 ▶</button>
  </div>
</div>

<button id="gear-btn" onclick="openSettings()">⚙️</button>

<div id="main">
  <div id="img-area" onclick="document.getElementById('file-in').click()">
    <input type="file" id="file-in" accept="image/*" onchange="loadImg(event)">
    <div id="img-ph"><div class="ico">🖼️</div><p>クリックして画像をアップロード（16:9推奨）</p></div>
    <img id="img-el" alt="">
  </div>

  <div id="lottery">
    <div class="phase-hint" id="phaseHint">まず設定してください</div>
    <div class="cards">
      <div class="card" id="cardT"><div class="card-lbl">テーブル</div><div class="card-val" id="tVal">—</div></div>
      <div class="card" id="cardS"><div class="card-lbl">座席</div><div class="card-val" id="sVal">—</div></div>
    </div>
    <div class="btns">
      <button class="btn btn-start" id="startBtn" onclick="handleStart()">▶ スタート</button>
      <button class="btn btn-stop"  id="stopBtn"  onclick="handleStop()" disabled>⏸ ストップ</button>
      <button class="btn btn-reset" onclick="resetAll()">↻ リセット</button>
    </div>
    <div class="remain" id="remainEl">—</div>
    <div class="hist" id="histEl"></div>
  </div>
</div>

<div id="jaan-wrap"><div id="jaan-txt">ジャーン！</div></div>

let tables=[],remaining=[],history=[];
let tTimer=null,sTimer=null;
let phase='idle';
let drumAudio=null,jaanAudio=null;

function initAudio(){
  if(!drumAudio){drumAudio=new Audio(DRUM_SRC);drumAudio.loop=true}
  if(!jaanAudio){jaanAudio=new Audio(JAAN_SRC)}
}

function openSettings(){document.getElementById('settings-overlay').classList.remove('hidden')}

function applySettings(){
  const f=parseInt(document.getElementById('from').value);
  const t=parseInt(document.getElementById('to').value);
  const ex=document.getElementById('exc').value;
  if(isNaN(f)||isNaN(t)||f>t){alert('範囲が正しくありません');return}
  const exNums=ex.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
  const exSet=new Set(exNums);
  tables=[];
  for(let i=f;i<=t;i++){if(!exSet.has(i))tables.push(i)}
  remaining=[...tables];history=[];
  document.getElementById('excTags').innerHTML=exNums.map(n=>`<span class="exc-tag">${n}番を除外</span>`).join('');
  document.getElementById('settings-overlay').classList.add('hidden');
  phase='idle';resetDisp();updateUI();
  initAudio();
}

function handleStart(){
  if(!tables.length){openSettings();return}
  if(remaining.length===0){resetAll();return}
  startBothSpin();
}

function handleStop(){
  if(phase==='both-spin') stopTable();
  else if(phase==='seat-spin') stopSeat();
}

function startBothSpin(){
  phase='both-spin';
  document.getElementById('cardT').className='card spinning';
  document.getElementById('cardS').className='card spinning';
  document.getElementById('tVal').classList.add('spin');
  document.getElementById('sVal').classList.add('spin');
  if(drumAudio){drumAudio.currentTime=0;drumAudio.play().catch(()=>{})}
  function tickT(){document.getElementById('tVal').textContent=remaining[Math.floor(Math.random()*remaining.length)];tTimer=setTimeout(tickT,60)}
  function tickS(){document.getElementById('sVal').textContent=Math.ceil(Math.random()*6);sTimer=setTimeout(tickS,60)}
  tickT();tickS();
  updateUI();
}

function stopTable(){
  clearTimeout(tTimer);
  document.getElementById('tVal').classList.remove('spin');
  document.getElementById('cardT').className='card fixed';
  const picked=parseInt(document.getElementById('tVal').textContent);
  if(!isNaN(picked)&&remaining.includes(picked)){remaining=remaining.filter(n=>n!==picked)}
  phase='seat-spin';
  updateUI();
}

function stopSeat(){
  clearTimeout(sTimer);
  if(drumAudio){drumAudio.pause();drumAudio.currentTime=0}
  document.getElementById('sVal').classList.remove('spin');
  document.getElementById('cardS').className='card fixed';
  const t=document.getElementById('tVal').textContent;
  const s=document.getElementById('sVal').textContent;
  history.unshift({t,s});
  phase='done';
  renderHist();updateRemain();
  if(jaanAudio){jaanAudio.currentTime=0;jaanAudio.play().catch(()=>{})}
  showJaan();
  updateUI();
}

function updateUI(){
  const sb=document.getElementById('startBtn'),sp=document.getElementById('stopBtn'),h=document.getElementById('phaseHint');
  if(!tables.length){h.textContent='まず設定してください';sb.disabled=true;sp.disabled=true;return}
  if(phase==='idle'){
    h.textContent='スタートを押してください';
    sb.textContent='▶ スタート';sb.disabled=false;sp.disabled=true;
  }else if(phase==='both-spin'){
    h.textContent='ストップ → テーブルが決まります';
    sb.disabled=true;sp.disabled=false;sp.textContent='⏸ ストップ（テーブル）';
  }else if(phase==='seat-spin'){
    h.textContent='もう一度ストップ → 座席が決まります';
    sb.disabled=true;sp.disabled=false;sp.textContent='⏸ ストップ（座席）';
  }else if(phase==='done'){
    h.textContent='決定！次の人はスタートを押してください';
    sb.textContent='▶ 次の人';sb.disabled=false;sp.disabled=true;
  }
  updateRemain();
}

function updateRemain(){
  const el=document.getElementById('remainEl');
  if(!tables.length){el.textContent='—';return}
  el.textContent=`残り ${remaining.length} / ${tables.length} 件`;
}

function resetDisp(){
  document.getElementById('tVal').textContent='—';
  document.getElementById('sVal').textContent='—';
  document.getElementById('tVal').classList.remove('spin');
  document.getElementById('sVal').classList.remove('spin');
  document.getElementById('cardT').className='card';
  document.getElementById('cardS').className='card';
}

function resetAll(){
  clearTimeout(tTimer);clearTimeout(sTimer);
  if(drumAudio){drumAudio.pause();drumAudio.currentTime=0}
  remaining=[...tables];history=[];
  phase='idle';resetDisp();renderHist();updateUI();
}

function renderHist(){
  document.getElementById('histEl').innerHTML=history.map((h,i)=>`<span class="h-tag ${i===0?'latest':''}">${h.t}番-${h.s}席</span>`).join('');
}

function showJaan(){
  const el=document.getElementById('jaan-txt');
  el.className='pop';
  setTimeout(()=>{el.className='fade';setTimeout(()=>{el.className=''},500)},1400);
}

function loadImg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    document.getElementById('img-el').src=ev.target.result;
    document.getElementById('img-el').style.display='block';
    document.getElementById('img-ph').style.display='none';
  };
  r.readAsDataURL(f);
}
</script>
